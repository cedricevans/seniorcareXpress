# Railway / Nixpacks config for monorepo
# Each service is deployed separately in Railway - point each service to its subdirectory

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build --prefix apps/web"]

[start]
cmd = "npm run start --prefix apps/api"
